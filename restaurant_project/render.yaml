services:
  - type: web
    name: restaurant-project
    runtime: python
    plan: free
    region: oregon
    buildCommand: bash build.sh
    startCommand: gunicorn restaurant_project.wsgi:application
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: restaurant-project-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ""
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: ""
      - key: DJANGO_TIME_ZONE
        value: Asia/Karachi
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "true"
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: "31536000"
databases:
  - name: restaurant-project-db
    plan: free
    region: oregon
